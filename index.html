    <script type="module" src="main.js"></script>
    <style>
        /* Pin the course to the absolute top-left corner to avoid all CSS conflicts */
        #viewport {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            margin: 0 !important;
            transform-origin: top left !important;
        }
    </style>

    <script>
        // Exact Math Scaling & Centering Logic
        function handleResize() {
            const viewport = document.getElementById('viewport');
            const targetWidth = 1920;
            const targetHeight = 1080;

            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // 1. Calculate the exact scale needed to fit the screen
            const scale = Math.min(windowWidth / targetWidth, windowHeight / targetHeight);

            // 2. Calculate the exact X and Y pixels to center the newly scaled course
            const xOffset = (windowWidth - (targetWidth * scale)) / 2;
            const yOffset = (windowHeight - (targetHeight * scale)) / 2;

            // 3. Apply the movement and the scale simultaneously
            viewport.style.transform = `translate(${xOffset}px, ${yOffset}px) scale(${scale})`;
        }

        window.addEventListener('resize', handleResize);
        handleResize(); // Initial call
    </script>
</body>

</html>
